name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run Electron E2E tests"
        required: false
        default: false
        type: boolean

jobs:
  checks:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit and integration tests
        run: npm test

  e2e:
    name: Electron E2E (manual opt-in)
    if: github.event_name == 'workflow_dispatch' && (inputs.run_e2e == true || inputs.run_e2e == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Electron E2E tests
        run: xvfb-run -a npm run test:e2e
