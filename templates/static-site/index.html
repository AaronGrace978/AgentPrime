<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{projectName}}</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">AgentPrime Static Starter</p>
        <h1>{{projectName}}</h1>
        <p class="lede">{{description}}</p>
        <div class="actions">
          <button type="button" id="primary-cta">Launch</button>
          <button type="button" id="secondary-cta" class="secondary">Preview</button>
        </div>
      </section>

      <section class="status-panel" aria-live="polite">
        <h2>Status</h2>
        <p id="status-message">Ready for customization.</p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
