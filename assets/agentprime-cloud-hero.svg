<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AgentPrime Cloud Hero</title>
  <desc id="desc">Futuristic cloud-first coding control room illustration for AgentPrime.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030817"/>
      <stop offset="45%" stop-color="#081534"/>
      <stop offset="100%" stop-color="#060b1d"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#2de2e6" stop-opacity="0.42"/>
      <stop offset="60%" stop-color="#2de2e6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2de2e6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="72%" cy="28%" r="35%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="65%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3cf0ff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#24d3ee" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2de2e6" stop-opacity="0"/>
      <stop offset="45%" stop-color="#2de2e6" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="strongBlur">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#1e2f56" stroke-opacity="0.28" stroke-width="1"/>
    </pattern>
    <pattern id="tinyGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0H0V10" fill="none" stroke="#2b3f6b" stroke-opacity="0.18" stroke-width="0.8"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#tinyGrid)" opacity="0.45"/>

  <ellipse cx="760" cy="410" rx="520" ry="280" fill="url(#glowCyan)"/>
  <ellipse cx="1120" cy="240" rx="420" ry="240" fill="url(#glowViolet)"/>
  <ellipse cx="460" cy="170" rx="270" ry="140" fill="#43f0f3" fill-opacity="0.11" filter="url(#softBlur)"/>

  <!-- Cloud routing arcs -->
  <g stroke-linecap="round" fill="none">
    <path d="M300 660C520 500 790 505 980 375" stroke="#2de2e6" stroke-opacity="0.45" stroke-width="3"/>
    <path d="M420 700C640 530 860 510 1170 318" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="3"/>
    <path d="M210 590C500 460 760 430 1290 220" stroke="#2de2e6" stroke-opacity="0.22" stroke-width="2"/>
    <path d="M360 760C670 565 970 500 1360 340" stroke="#8b5cf6" stroke-opacity="0.24" stroke-width="2"/>
  </g>

  <!-- Floating model nodes -->
  <g>
    <circle cx="980" cy="375" r="12" fill="#2de2e6"/>
    <circle cx="1170" cy="318" r="12" fill="#8b5cf6"/>
    <circle cx="1290" cy="220" r="9" fill="#2de2e6"/>
    <circle cx="1360" cy="340" r="9" fill="#8b5cf6"/>
    <circle cx="980" cy="375" r="24" fill="#2de2e6" fill-opacity="0.14" filter="url(#softBlur)"/>
    <circle cx="1170" cy="318" r="24" fill="#8b5cf6" fill-opacity="0.14" filter="url(#softBlur)"/>
  </g>

  <!-- Main holographic panel -->
  <g transform="translate(190 180)">
    <rect x="0" y="0" width="1220" height="470" rx="26" fill="#09162f" fill-opacity="0.65" stroke="url(#panelStroke)" stroke-opacity="0.7" stroke-width="2"/>
    <rect x="18" y="18" width="1184" height="434" rx="18" fill="none" stroke="#33d6ff" stroke-opacity="0.24" stroke-width="1"/>

    <rect x="36" y="54" width="430" height="330" rx="14" fill="#071226" fill-opacity="0.8" stroke="#2de2e6" stroke-opacity="0.35"/>
    <rect x="496" y="54" width="688" height="190" rx="14" fill="#071226" fill-opacity="0.78" stroke="#8b5cf6" stroke-opacity="0.35"/>
    <rect x="496" y="266" width="688" height="118" rx="14" fill="#071226" fill-opacity="0.72" stroke="#2de2e6" stroke-opacity="0.3"/>

    <!-- Faux code lines -->
    <g stroke-linecap="round">
      <line x1="58" y1="88" x2="220" y2="88" stroke="#2de2e6" stroke-width="5" stroke-opacity="0.8"/>
      <line x1="58" y1="114" x2="330" y2="114" stroke="#7dd3fc" stroke-width="4" stroke-opacity="0.7"/>
      <line x1="58" y1="140" x2="286" y2="140" stroke="#c084fc" stroke-width="4" stroke-opacity="0.7"/>
      <line x1="58" y1="166" x2="374" y2="166" stroke="#5eead4" stroke-width="4" stroke-opacity="0.66"/>
      <line x1="58" y1="206" x2="240" y2="206" stroke="#7dd3fc" stroke-width="4" stroke-opacity="0.7"/>
      <line x1="58" y1="232" x2="350" y2="232" stroke="#2de2e6" stroke-width="4" stroke-opacity="0.7"/>
      <line x1="58" y1="258" x2="260" y2="258" stroke="#c084fc" stroke-width="4" stroke-opacity="0.7"/>
      <line x1="58" y1="284" x2="312" y2="284" stroke="#5eead4" stroke-width="4" stroke-opacity="0.7"/>
      <line x1="58" y1="310" x2="196" y2="310" stroke="#2de2e6" stroke-width="4" stroke-opacity="0.65"/>
    </g>

    <!-- Token graph -->
    <g transform="translate(530 85)">
      <polyline points="0,100 90,72 180,78 270,38 360,58 450,20 538,44" fill="none" stroke="#2de2e6" stroke-width="4"/>
      <polyline points="0,120 90,112 180,98 270,89 360,96 450,84 538,72" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-opacity="0.8"/>
      <circle cx="270" cy="38" r="6" fill="#2de2e6"/>
      <circle cx="450" cy="20" r="6" fill="#2de2e6"/>
      <circle cx="538" cy="44" r="6" fill="#2de2e6"/>
    </g>

    <!-- Runtime bars -->
    <g transform="translate(530 298)">
      <rect x="0" y="0" width="548" height="20" rx="10" fill="#122447"/>
      <rect x="0" y="0" width="480" height="20" rx="10" fill="url(#beam)"/>
      <rect x="0" y="36" width="548" height="20" rx="10" fill="#122447"/>
      <rect x="0" y="36" width="404" height="20" rx="10" fill="#2de2e6" fill-opacity="0.7"/>
      <rect x="0" y="72" width="548" height="20" rx="10" fill="#122447"/>
      <rect x="0" y="72" width="516" height="20" rx="10" fill="#8b5cf6" fill-opacity="0.72"/>
    </g>

    <!-- UI chips -->
    <g font-family="'JetBrains Mono', Consolas, monospace" font-size="16" font-weight="700">
      <rect x="44" y="400" width="170" height="30" rx="15" fill="#102a50" stroke="#2de2e6" stroke-opacity="0.6"/>
      <text x="66" y="420" fill="#9fe7ff">OLLAMA CLOUD</text>
      <rect x="222" y="400" width="120" height="30" rx="15" fill="#1a1e46" stroke="#8b5cf6" stroke-opacity="0.6"/>
      <text x="248" y="420" fill="#dbc8ff">DEEP</text>
    </g>
  </g>

  <!-- Ground glow -->
  <ellipse cx="800" cy="815" rx="610" ry="42" fill="#1cc7ea" fill-opacity="0.2" filter="url(#strongBlur)"/>

  <!-- Branding -->
  <g transform="translate(210 112)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="4" fill="#39dcff">AGENTPRIME</text>
    <text x="0" y="34" font-family="'Segoe UI', Arial, sans-serif" font-size="14" letter-spacing="2" fill="#9ab3db">CLOUD-FIRST AI WORKSPACE</text>
  </g>
</svg>
